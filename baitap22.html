<!DOCTYPE html>
<html>
<head>
    <title>Sự kiện di chuyển chuột</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <style>
        #status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #f1f1f1;
            border-top: 1px solid #ccc;
            padding: 5px;
            font-size: 14px;
            height: 25px;
        }
        body { font-family: Arial; padding-bottom: 50px; }
    </style>
</head>
<body>

    Họ tên: <input type="text" name="HoTen" onMouseMove="ShowStatus('Bạn đang di chuyển chuột vào ô Họ Tên')">
    <br><br>

    Giới tính: 
    <input type="radio" name="GioiTinh" onMouseMove="ShowStatus('Bạn đang di chuyển chuột vào lựa chọn Nam')"> Nam
    <input type="radio" name="GioiTinh" onMouseMove="ShowStatus('Bạn đang di chuyển chuột vào lựa chọn Nữ')"> Nữ
    <br><br>

    <input type="button" value="Gửi" onMouseMove="ShowStatus('Bạn đang di chuyển chuột vào nút Gửi')">

    <div id="status-bar">Sẵn sàng...</div>

    <script language="JavaScript">
        function ShowStatus(msg) {
            document.getElementById("status-bar").innerText = msg;
            window.status = msg;
        }
    </script>

</body>
</html>
