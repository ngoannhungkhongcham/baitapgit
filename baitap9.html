<!DOCTYPE html>
<html lang="en"></html>
<html>
<head>
    <title>Tính tuổi</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
</head>
<body>
    <script language="JavaScript">
        var d = new Date();
        var namHienTai = d.getFullYear();
        var namSinh;

        do {
            namSinh = prompt("Bạn sinh năm bao nhiêu : ", "");
            
            if (namSinh !== null) {
                namSinh = parseInt(namSinh);
            }
        } while (namSinh > namHienTai || isNaN(namSinh));

        var tuoi = namHienTai - namSinh;
        alert("Tuổi của bạn bây giờ là : " + tuoi);
    </script>
</body>
</html>
