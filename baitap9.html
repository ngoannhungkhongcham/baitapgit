<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tính tuổi</title>
</head>
<body>
    <script>
        var d = new Date();
        var namHienTai = d.getFullYear();
        var namSinh;

        while (true) {
            namSinh = prompt("Bạn sinh năm bao nhiêu:");
            namSinh = parseInt(namSinh);

            if (!isNaN(namSinh) && namSinh <= namHienTai && namSinh > 0) {
                break;
            }
            alert("Dữ liệu không hợp lệ, vui lòng nhập lại!");
        }

        var tuoi = namHienTai - namSinh;
        alert("Tuổi của bạn là: " + tuoi);
    </script>
</body>
</html>
