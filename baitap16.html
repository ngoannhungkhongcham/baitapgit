<!doctype html>
<html>
  <head>
    <script>
      function ThayDoi() {
        document.body.style.backgroundColor = frm.MauNen.value;
        document.body.style.color = frm.MauChu.value;
        document.title = frm.TieuDe.value;
        tt.innerHTML = frm.TrangThai.value;
      }
    </script>
  </head>

  <body>
    <form name="frm">
      MauNen: <input name="MauNen" /><br />
      MauChu: <input name="MauChu" /><br />
      TieuDe: <input name="TieuDe" /><br />
      TrangThai: <input name="TrangThai" /><br />
      <input type="button" value="Thay đổi" onclick="ThayDoi()" />
    </form>

    <p id="tt"></p>
  </body>
</html>
