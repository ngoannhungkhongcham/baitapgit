<!DOCTYPE html>
<html lang="en"></html>
<html>
<head>
<title>Tính tuổi</title>
<meta charset="UTF-8">
</head>

<body>
<script>
var D = new Date();
var NamSinh, NamHienTai;

NamHienTai = D.getFullYear(); 

NamSinh = prompt("Bạn sinh năm bao nhiêu?", "");

var Tuoi = NamHienTai - Number(NamSinh);

alert("Tuổi của bạn bây giờ là: " + Tuoi);
</script>
</body>
</html>
