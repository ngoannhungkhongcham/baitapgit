<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính Tuổi</title>
</head>
<body>
    <script>
        var thoiGian = new Date();
        var namHienTai = thoiGian.getFullYear(); 

        var namSinh = prompt("Vui lòng nhập năm sinh của bạn:", "");

        if (namSinh !== null && namSinh !== "") {
            namSinh = parseInt(namSinh);

            if (namSinh <= namHienTai) {
                var tuoi = namHienTai - namSinh;
                alert("Năm nay là " + namHienTai + ". Tuổi của bạn là: " + tuoi);
            } else {
                alert("Năm sinh không hợp lệ! Vui lòng nhập năm sinh nhỏ hơn hoặc bằng " + namHienTai);
            }
        }
    </script>
</body>
</html>
