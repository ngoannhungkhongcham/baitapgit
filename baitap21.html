<!DOCTYPE html>
<html>
<head>
    <title>Kiểm tra độ dài ký tự</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
</head>
<body>

    <textarea id="NoiDung" name="NoiDung" rows="5" cols="40" oninput="DemKyTu()"></textarea>
    <br>
    
    <label for="SoKyTu">Số kí tự đã nhập vào: </label>
    <input type="text" id="SoKyTu" name="SoKyTu" readonly>

    <script language="JavaScript">
        function DemKyTu() {
            var txt = document.getElementById("NoiDung");
            var box = document.getElementById("SoKyTu");
            var doDai = txt.value.length;

            box.value = doDai;

            if (doDai > 200) {
                alert("Bạn đã gõ quá số ký tự cho phép!");
                txt.value = txt.value.substring(0, 200);
                box.value = 200;
            }
        }
    </script>

</body>
</html>
