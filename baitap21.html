<!DOCTYPE html>
<html lang="en">
<head>
    <title>Kiểm tra độ dài ký tự</title>
    <meta charset="utf-8">
</head>
<body>

    <p>Nhập nội dung (Tối đa 200 ký tự):</p>
    <textarea id="NoiDung" rows="5" cols="40" oninput="dem()"></textarea>
    <br>
    
    <label>Số ký tự: </label>
    <input type="text" id="SoKyTu" value="0" readonly>

    <script>
        function dem() {
            var vungNhap = document.getElementById("NoiDung");
            var oHienThi = document.getElementById("SoKyTu");
            var doDai = vungNhap.value.length;

            if (doDai > 200) {
                alert("Bạn đã gõ quá 200 ký tự!");
                // Cắt bỏ các ký tự thừa
                vungNhap.value = vungNhap.value.substring(0, 200);
                doDai = 200;
            }

            oHienThi.value = doDai;
        }
    </script>

</body>
</html>
