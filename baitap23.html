<!DOCTYPE html>
<html lang="en">
<head> 
<title>Tinh tich</title> 
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8"> 
</head> 

<body style="font-family:arial;background-color:rgb(230, 246, 250)"> 

<script>
window.onload = function() {
  SoLuong = document.getElementsByName("SoLuong")[0];
  DonGia = document.getElementsByName("DonGia")[0];
  ThanhTien = document.getElementsByName("ThanhTien")[0];
}
</script>

<H1>Bạn hãy nhập vào số lượng và giá:</H1> 

Số lượng: <input name="SoLuong"> 

Đơn giá:<input name="DonGia" onKeyUp="ThanhTien.value=SoLuong.value*DonGia.value"> 

<HR>

Thành tiền:<input name="ThanhTien"> USD 

</body> 
</html>
